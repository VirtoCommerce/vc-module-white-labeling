<div class="blade-content __medium-wide">
  <div class="blade-inner">
    <div class="inner-block">
      <form class="form" name="formScope">

        <fieldset ng-init="setForm(formScope)">

          <div class="form-group">
            <label class="form-label">{{ 'white-labeling.blades.white-labeling-detail.labels.enabled' | translate }}</label>
            <div class="form-input">
              <label class="form-label __switch">
                <input type="checkbox" ng-model="blade.currentEntity.isEnabled">
                <span class="switch"></span>
              </label>
            </div>
          </div>

          <div class="form-group">
            <va-widget-container group="whiteLabelingLogos" blade="blade" gridster-opts="{columns: 3}"></va-widget-container>
          </div>

          <div class="form-group">
            <va-setting-value-select blade="blade"
                                     label="'white-labeling.blades.white-labeling-detail.labels.preset-name' | translate"
                                     placeholder="'white-labeling.blades.white-labeling-detail.placeholders.preset-name' | translate"
                                     setting="'WhiteLabeling.ThemePresetNames'"
                                     ng-model="blade.currentEntity.themePresetName"></va-setting-value-select>
          </div>

          <div class="form-group">
            <label class="form-label">{{ 'white-labeling.blades.white-labeling-detail.labels.main-menu-link-list' | translate }}</label>
            <div class="form-input">
              <input type="text" ng-model="blade.currentEntity.mainMenuLinkListName"
                     placeholder="{{ 'white-labeling.blades.white-labeling-detail.placeholders.main-menu-link-list' | translate }}">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">{{ 'white-labeling.blades.white-labeling-detail.labels.footer-link-list' | translate }}</label>
            <div class="form-input">
              <input type="text" ng-model="blade.currentEntity.footerLinkListName"
                     placeholder="{{ 'white-labeling.blades.white-labeling-detail.placeholders.footer-link-list' | translate }}">
            </div>
          </div>

        </fieldset>

      </form>
    </div>
  </div>
</div>
